<div class="login-img">
    <div class="page">
        <div class="">
            <div class="col col-login mx-auto">
                <div class="text-center">
                    <h2 class="text-primary fw-bold">SCHOOL CONNECT</h2>
                </div>
            </div>
            <div class="container-login100">
                <div class="wrap-login100 p-6">
                    <form class="login100-form validate-form" (ngSubmit)="onSubmit()">
                        <span class="login100-form-title">
                            Giriş Yap
                        </span>
                        

                        <div class="wrap-input100 validate-input" data-bs-validate = "Valid email is required: ex@abc.xyz">
                            <input class="input100" type="text" name="email" placeholder="E-posta Adresi" [(ngModel)]="email">
                            <span class="focus-input100"></span>
                            <span class="symbol-input100">
                                <i class="zmdi zmdi-email" aria-hidden="true"></i>
                            </span>
                        </div>
                        <div class="wrap-input100 validate-input" data-bs-validate = "Password is required">
                            <input class="input100" type="password" name="pass" placeholder="Şifre" [(ngModel)]="password">
                            <span class="focus-input100"></span>
                            <span class="symbol-input100">
                                <i class="zmdi zmdi-lock" aria-hidden="true"></i>
                            </span>
                        </div>
                        
                        <div class="container-login100-form-btn">
                            <button type="submit" [disabled]="isLoading()" class="login100-form-btn btn-primary">
                                @if (isLoading()) {
                                    <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                                }
                                Giriş Yap
                            </button>
                        </div>
                        <div class="text-center pt-3">
                            <p class="mb-0">Henüz hesabınız yok mu?<a routerLink="/auth/register" class="text-primary ms-1">Hemen Kayıt Olun</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
